<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pneuscan Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">
    <div class="login-left">
        <div class="brand-block">
            <h1>PNEUSCAN</h1>
            <p>Precision. Insight. Breath.</p>
            <span>AI-Powered Pneumonia Detection</span>
        </div>
    </div>

    <div class="login-right">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p class="muted">Enter your credentials to access the diagnostic portal</p>

            {% if error %}
                <div class="error-box">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('login') }}">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter email" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>

                <button type="submit" class="primary-btn">Sign In</button>
            </form>

            <div class="demo-text">
                Demo Credentials: <strong>admin@pneuscan.com / admin123</strong>
            </div>
        </div>
    </div>
</body>
</html>
